<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TFG Donación Renal</title>

  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <section id="login-view" class="view active">
    <div class="page-login">

      <div class="header-login">
        <h1>¡BIENVENIDO/A!</h1>
        <p>Ya puedes realizar tus predicciones</p>
      </div>

      <div class="card">
        <h2>Inicio de Sesión</h2>

        <form id="login-form">
          <div class="input-group">
            <span class="icon">✉</span>
            <input type="email" id="login-email" placeholder="Email" required>
          </div>

          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12,17c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2H9V6z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="password" id="login-password" placeholder="Contraseña" required>
          </div>

          <button type="button" id="forgot-password-btn" class="link">
            ¿Has olvidado tu contraseña?
          </button>

          <button type="submit" class="btn">Entrar</button>

          <div class="bottom">
            <span>¿No tienes una cuenta?</span>
            <button type="button" id="go-register">Regístrate</button>
          </div>
        </form>

        <p id="login-message"></p>
      </div>
    </div>
  </section>

  <!-- REGISTER -->
  <section id="register-view" class="view">
    <div class="card register register-wide">

      <button type="button" id="go-login" class="back">← Volver</button>

      <h1>Registro</h1>

      <form id="register-form">
        <div class="register-grid">
          <div class="register-column">
            <div class="input-group">
              <span class="icon">
                <svg viewBox="0 0 24 24">
                  <path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z" fill="#042939"/>
                </svg>
              </span>
              <input type="text" id="register-name" placeholder="Nombre" required>
            </div>

            <div class="input-group">
              <span class="icon">
                <svg viewBox="0 0 24 24">
                  <path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z" fill="#042939"/>
                </svg>
              </span>
              <input type="text" id="register-lastname" placeholder="Apellidos" required>
            </div>

            <div class="input-group date-group">
              <span class="icon clickable-icon" id="calendar-icon" role="button" tabindex="0" aria-label="Abrir calendario">
                <svg viewBox="0 0 24 24">
                  <path d="M19,4h-1V2h-2v2H8V2H6v2H5c-1.1,0 -2,0.9 -2,2v13c0,1.1 0.9,2 2,2h14c1.1,0 2,-0.9 2,-2V6c0,-1.1 -0.9,-2 -2,-2zM19,19H5V9h14v10z" fill="#042939"/>
                </svg>
              </span>
              <input type="date" id="register-birthdate" required>
            </div>
          </div>

          <div class="register-column">
            <div class="input-group">
              <span class="icon">✉</span>
              <input type="email" id="register-email" placeholder="Correo Electrónico" required>
            </div>

            <div class="input-group">
              <span class="icon">
                <svg viewBox="0 0 24 24">
                  <path d="M12,17c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2H9V6z" fill="#042939"/>
                </svg>
              </span>
              <input type="password" id="register-password" placeholder="Contraseña" required>
            </div>

            <div class="input-group">
              <span class="icon">
                <svg viewBox="0 0 24 24">
                  <path d="M12,17c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2H9V6z" fill="#042939"/>
                </svg>
              </span>
              <input type="password" id="register-confirm-password" placeholder="Confirmar Contraseña" required>
            </div>
          </div>
        </div>

        <div class="role-block">
          <label for="register-role">Selecciona tu rol</label>
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M7,10l5,5l5,-5z" fill="#042939"/>
              </svg>
            </span>
            <select id="register-role" required>
              <option value="">Selecciona una opción</option>
              <option value="Médico">Médico</option>
              <option value="Administrador">Administrador</option>
            </select>
          </div>
        </div>

        <div class="register-actions">
          <button type="submit" class="btn register-btn">Registrarse</button>
        </div>
      </form>

      <p id="register-message"></p>
    </div>
  </section>

</div>

<script type="module" src="../js/main.js"></script>
</body>
</html>
