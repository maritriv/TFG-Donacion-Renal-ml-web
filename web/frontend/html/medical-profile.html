<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil del Usuario</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <section class="admin-profile-page medical-profile-page">
    <button type="button" id="btn-back" class="back admin-profile-back">← Volver</button>

    <header class="admin-profile-header">
      <h1>Perfil del Usuario</h1>
    </header>

    <main class="admin-profile-content medical-profile-content">
      <section class="admin-profile-card">
        <div class="admin-profile-avatar">
          <svg viewBox="0 0 24 24">
            <path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z" fill="#042939"></path>
          </svg>
        </div>

        <div class="admin-profile-fields">
          <select id="profile-role" class="profile-input profile-edit-only">
            <option value="Médico">Médico</option>
            <option value="Administrador">Administrador</option>
          </select>

          <p id="profile-role-text" class="profile-role-text">Médico</p>

          <input id="profile-name" class="profile-input" disabled>
          <input id="profile-lastname" class="profile-input" disabled>
          <input id="profile-email" class="profile-input profile-secondary" disabled>
          <input id="profile-birthdate" class="profile-input profile-secondary" disabled>
        </div>

        <div class="admin-profile-actions">
          <button type="button" id="profile-status" class="profile-status active">Activo</button>
          <button type="button" id="btn-cancel-edit" class="profile-icon-btn profile-edit-only">×</button>
          <button type="button" id="btn-edit" class="profile-icon-btn">✎</button>
        </div>
      </section>

      <button type="button" id="btn-save" class="action-outline-btn profile-edit-only">
        Realizar cambios
      </button>

      <button type="button" id="btn-delete" class="action-outline-btn profile-edit-only">
        Eliminar usuario
      </button>

      <section class="historial-card medical-predictions-card">
        <div class="historial-card-top">
          <h2>PREDICCIONES</h2>

          <div class="historial-actions-row">
            <span id="historial-count">Mostrando 0 filas</span>

            <button type="button" id="btn-sort" class="historial-action-btn">Ordenar</button>
            <button type="button" id="btn-filter" class="historial-action-btn">Filtrar</button>
            <button type="button" id="btn-export" class="historial-action-btn">Exportar</button>
          </div>
        </div>

        <p id="historial-empty" class="historial-empty" hidden>
          No hay predicciones registradas.
        </p>

        <div class="historial-table-wrapper">
          <table class="historial-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Edad</th>
                <th>Sexo</th>
                <th>Capnometría</th>
                <th>Causa cardíaca</th>
                <th>Cardiocompresión</th>
                <th>Rec. del pulso</th>
                <th>Momento</th>
                <th>IMC</th>
                <th>Grupo sanguíneo</th>
                <th>Adrenalina</th>
                <th>Colesterol</th>
                <th>Resultado</th>
                <th>Índice</th>
                <th>Informe</th>
              </tr>
            </thead>

            <tbody id="historial-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </section>

  <div id="confirm-modal" class="profile-modal-overlay" hidden>
    <div class="profile-modal">
      <h2 id="confirm-title"></h2>
      <p id="confirm-message"></p>

      <div class="profile-modal-actions">
        <button type="button" id="confirm-cancel">Cancelar</button>
        <button type="button" id="confirm-accept">Aceptar</button>
      </div>
    </div>
  </div>

  <div id="sort-modal-overlay" class="historial-modal-overlay" hidden>
    <div class="historial-modal">
      <h2>Ordenar predicciones por</h2>

      <div class="historial-modal-select-wrapper">
        <select id="sort-select">
          <option value="edad">Edad</option>
          <option value="capnometria">Capnometría</option>
          <option value="momento">Momento</option>
          <option value="indice">Índice</option>
          <option value="imc">IMC</option>
          <option value="adrenalina">Adrenalina</option>
        </select>
      </div>

      <div class="historial-modal-actions">
        <button type="button" id="btn-sort-cancel">Cancelar</button>
        <button type="button" id="btn-sort-apply">Aplicar</button>
      </div>
    </div>
  </div>

  <div id="filter-modal-overlay" class="historial-modal-overlay" hidden>
    <div class="historial-modal historial-filter-modal">
      <h2>Filtrar predicciones</h2>

      <div class="filter-grid">
        <div class="filter-field">
          <label>Edad</label>
          <div class="filter-row">
            <input id="filter-edad-min" type="number" placeholder="Mín.">
            <input id="filter-edad-max" type="number" placeholder="Máx.">
          </div>
        </div>

        <div class="filter-field">
          <label>Sexo</label>
          <select id="filter-sexo">
            <option value="">Cualquiera</option>
            <option value="H">Hombre</option>
            <option value="M">Mujer</option>
          </select>
        </div>

        <div class="filter-field">
          <label>Capnometría</label>
          <div class="filter-row">
            <input id="filter-capno-min" type="number" placeholder="Mín.">
            <input id="filter-capno-max" type="number" placeholder="Máx.">
          </div>
        </div>

        <div class="filter-field">
          <label>Causa cardíaca</label>
          <select id="filter-causa">
            <option value="">Cualquiera</option>
            <option value="Si">Sí</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="filter-field">
          <label>Cardiocompresión manual</label>
          <select id="filter-cardio">
            <option value="">Cualquiera</option>
            <option value="Manual">Manual</option>
            <option value="Mecánica">Mecánica</option>
          </select>
        </div>

        <div class="filter-field">
          <label>Recuperación pulso</label>
          <select id="filter-rec">
            <option value="">Cualquiera</option>
            <option value="Si">Sí</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="filter-field">
          <label>Resultado</label>
          <select id="filter-resultado">
            <option value="">Cualquiera</option>
            <option value="Si">Válido</option>
            <option value="No">No válido</option>
          </select>
        </div>

        <div class="filter-field">
          <label>IMC</label>
          <div class="filter-row">
            <input id="filter-imc-min" type="number" step="0.01" placeholder="Mín.">
            <input id="filter-imc-max" type="number" step="0.01" placeholder="Máx.">
          </div>
        </div>

        <div class="filter-field">
          <label>Grupo sanguíneo</label>
          <select id="filter-grupo">
            <option value="">Cualquiera</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="AB">AB</option>
            <option value="O">O</option>
          </select>
        </div>

        <div class="filter-field">
          <label>Adrenalina</label>
          <div class="filter-row">
            <input id="filter-adrenalina-min" type="number" placeholder="Mín.">
            <input id="filter-adrenalina-max" type="number" placeholder="Máx.">
          </div>
        </div>

        <div class="filter-field">
          <label>Colesterol</label>
          <select id="filter-colesterol">
            <option value="">Cualquiera</option>
            <option value="No">No</option>
            <option value="Sí">Sí</option>
          </select>
        </div>
      </div>

      <div class="historial-modal-actions">
        <button type="button" id="btn-filter-clear">Limpiar</button>
        <button type="button" id="btn-filter-cancel">Cancelar</button>
        <button type="button" id="btn-filter-apply">Aplicar</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="../js/admin/medical-profile.js"></script>
</body>
</html>
