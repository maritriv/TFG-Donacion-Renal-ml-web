<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio Médico</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="dashboard-page">
    <header class="topbar">
      <button type="button" id="menu-toggle-btn" class="menu-button" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="topbar-title">RENAL-DCD</div>

      <div class="topbar-right"></div>
    </header>

    <div id="drawer-overlay" class="drawer-overlay"></div>

    <aside id="side-drawer" class="side-drawer" aria-hidden="true">
      <div class="drawer-header">
        <button type="button" id="drawer-close-btn" class="drawer-close-btn" aria-label="Cerrar menú">
          <svg viewBox="0 0 24 24">
            <path d="M19,6.41L17.59,5 12,10.59 6.41,5 5,6.41 10.59,12 5,17.59 6.41,19 12,13.41 17.59,19 19,17.59 13.41,12z" fill="#FFFFFF"></path>
          </svg>
        </button>

        <div class="drawer-avatar">
          <svg viewBox="0 0 24 24">
            <path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z" fill="#042939"></path>
          </svg>
        </div>

        <div class="drawer-title">Mi perfil</div>
      </div>

      <div class="drawer-body">
        <button type="button" id="drawer-edit-profile-btn" class="drawer-item-btn">
          <span class="drawer-item-icon">
            <svg viewBox="0 0 24 24">
              <path d="M20,11L7.8,11l5.6,-5.6L12,4l-8,8l8,8l1.4,-1.4L7.8,13L20,13L20,11z" fill="#4b4b4b"></path>
            </svg>
          </span>
          <span>Editar perfil</span>
        </button>

        <button type="button" id="drawer-logout-btn" class="drawer-item-btn">
          <span class="drawer-item-icon">
            <svg viewBox="0 0 24 24">
              <path d="M20,11L7.8,11l5.6,-5.6L12,4l-8,8l8,8l1.4,-1.4L7.8,13L20,13L20,11z" fill="#4b4b4b"></path>
            </svg>
          </span>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <main class="dashboard-content">
      <section class="dashboard-grid">
        <article class="dashboard-card chart-card">
          <div class="chart-filter">
            <select id="prediction-filter" class="chart-select">
              <option>Todos los momentos</option>
              <option>Mitad del procedimiento de RCP (20 min)</option>
              <option>Después del procedimiento de RCP</option>
            </select>
            <span class="chart-select-icon">
              <svg viewBox="0 0 24 24">
                <path d="M7,10l5,5l5,-5z" fill="#042939"></path>
              </svg>
            </span>
          </div>

          <div class="donut-wrapper">
            <div class="donut-chart" aria-label="Resumen de predicciones">
              <div class="donut-inner">
                <div id="medico-total-predicciones" class="donut-number">0</div>
                <div class="donut-label">PREDICCIONES</div>
              </div>
            </div>
          </div>

          <div class="chart-legend">
            <div class="legend-item">
              <span class="legend-dot legend-dot-valid"></span>
              <span id="medico-validas-text">0% Válidas</span>
            </div>

            <div class="legend-item">
              <span class="legend-dot legend-dot-invalid"></span>
              <span id="medico-no-validas-text">0% No válidas</span>
            </div>
          </div>
        </article>

        <article class="dashboard-card actions-card">
          <button type="button" class="action-outline-btn">REALIZAR PREDICCIÓN</button>
          <button type="button" class="action-outline-btn">HISTORIAL PREDICCIONES</button>
          <button type="button" class="action-outline-btn">IMPORTAR PREDICCIONES</button>

          <p id="medico-user-message" class="dashboard-user-message">Cargando datos...</p>
          <button type="button" id="logout-btn-medico" class="btn dashboard-logout-btn">Cerrar sesión</button>
        </article>
      </section>
    </main>
  </div>

  <script type="module" src="./js/medico/medico-main.js"></script>
</body>
</html>
