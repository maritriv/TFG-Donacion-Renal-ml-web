<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar perfil</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<section class="edit-profile-page">
  <div class="card edit-profile-card">

    <button type="button" id="back-btn" class="edit-profile-back">← Volver</button>

    <h1 class="edit-profile-title">Editar perfil</h1>

    <form id="edit-profile-form">
      <div class="edit-profile-grid">

        <div class="edit-profile-column">
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="text" id="edit-name" placeholder="Nombre" required autocomplete="given-name">
          </div>

          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="text" id="edit-lastname" placeholder="Apellidos" required autocomplete="family-name">
          </div>

          <div class="input-group date-group">
            <span
              class="icon clickable-icon"
              id="edit-calendar-icon"
              role="button"
              tabindex="0"
              aria-label="Abrir calendario"
            >
              <svg viewBox="0 0 24 24">
                <path d="M19,4h-1V2h-2v2H8V2H6v2H5c-1.1,0 -2,0.9 -2,2v13c0,1.1 0.9,2 2,2h14c1.1,0 2,-0.9 2,-2V6c0,-1.1 -0.9,-2 -2,-2zM19,19H5V9h14v10z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="date" id="edit-birthdate" required>
          </div>

          <div class="input-group">
            <span class="icon">✉</span>
            <input type="email" id="edit-email" placeholder="Email" required autocomplete="email">
          </div>
        </div>

        <div class="edit-profile-column">
          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12,17c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2H9V6z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="password" id="edit-password" placeholder="Contraseña actual" autocomplete="current-password">
          </div>

          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12,17c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2H9V6z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="password" id="edit-new-password" placeholder="Nueva contraseña" autocomplete="new-password">
          </div>

          <div class="input-group">
            <span class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12,17c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8h-1V6c0,-2.76 -2.24,-5 -5,-5S7,3.24 7,6v2H6c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2H9V6z"
                      fill="#042939"/>
              </svg>
            </span>
            <input type="password" id="edit-confirm-password" placeholder="Confirmar contraseña" autocomplete="new-password">
          </div>
        </div>

      </div>

      <div class="edit-profile-actions">
        <button type="submit" class="btn edit-profile-save-btn">Realizar cambios</button>
      </div>

      <p id="edit-message" class="edit-profile-message"></p>
    </form>
  </div>
</section>

<div id="discard-modal" class="confirm-modal-overlay">
  <div class="confirm-modal">
    <h2 class="confirm-modal-title">Descartar cambios</h2>
    <p class="confirm-modal-text">
      ¿Estás seguro de que quieres descartar los cambios realizados?
    </p>
    <div class="confirm-modal-actions">
      <button type="button" id="cancel-discard" class="confirm-modal-btn secondary">Cancelar</button>
      <button type="button" id="confirm-discard" class="confirm-modal-btn primary">Descartar</button>
    </div>
  </div>
</div>

<script type="module" src="./js/edit-profile/edit-profile.js"></script>
</body>
</html>
